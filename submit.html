<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lions — Log Session</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F8F7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border-radius: 16px; padding: 32px 24px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .lion { font-size: 52px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 600; color: #1A1A18; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #5F5E5A; margin-bottom: 24px; }
  .detail-box { background: #EEEDFE; border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; }
  .detail-name { font-size: 17px; font-weight: 600; color: #26215C; margin-bottom: 4px; }
  .detail-loc { font-size: 13px; color: #534AB7; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 10px; border: none; }
  .btn-primary { background: #26215C; color: white; }
  .btn-primary:hover { background: #3C3489; }
  .btn-secondary { background: #F0EFEB; color: #444441; }
  .btn-secondary:hover { background: #E0DFDB; }
  .note { font-size: 12px; color: #888780; margin-top: 16px; line-height: 1.6; }
  .error { background: #FCEBEB; color: #A32D2D; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="lion">🦁</div>
  <h1>Log your session</h1>
  <p class="sub">Review your details and tap to submit</p>

  <div class="error" id="error-box">Could not load session details. Please go back to the app.</div>

  <div class="detail-box" id="detail-box">
    <div class="detail-name" id="player-name">Loading...</div>
    <div class="detail-loc" id="player-loc"></div>
  </div>

  <a id="submit-btn" href="#" target="_blank" class="btn btn-primary">📋 Submit to Google Forms</a>
  <button class="btn btn-secondary" onclick="window.history.back()">← Go back</button>

  <p class="note">Tapping Submit opens Google Forms with your info pre-filled.<br>Just hit <strong>Submit</strong> on that page and you're done.</p>
</div>

<script>
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeZjGjDxRXBdrQ2NY9FL5iWfyITCYX_DoWY_adDspy-sL7Okw/formResponse';

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    name: p.get('name'),
    group: p.get('group'),
    phase: p.get('phase'),
    week: p.get('week'),
    day: p.get('day')
  };
}

function buildFormURL(p) {
  const params = new URLSearchParams({
    'entry.2115284305': p.name,
    'entry.1660752183': p.group,
    'entry.1461489066': p.phase || '-',
    'entry.1984450758': p.week,
    'entry.372827159': p.day === 'upper' ? 'Upper body' : 'Lower body',
    'entry.980302362': new Date().toISOString().split('T')[0],
    'entry.390357744': new Date().toLocaleString('en-CA')
  });
  return FORM_URL + '?' + params.toString();
}

function locStr(p) {
  const g = p.group === 'A' ? 'Group A · Phase ' + p.phase : p.group === 'B' ? 'Group B' : 'Group C';
  return g + ' · Week ' + p.week + ' · ' + (p.day === 'upper' ? 'Upper body' : 'Lower body');
}

const p = getParams();
if (!p.name) {
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('detail-box').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'none';
} else {
  document.getElementById('player-name').textContent = p.name;
  document.getElementById('player-loc').textContent = locStr(p);
  document.getElementById('submit-btn').href = buildFormURL(p);
}
</script>
</body>
</html>
